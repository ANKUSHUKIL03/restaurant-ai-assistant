<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant AI Assistant</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .chat-container {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #ff7a18, #af002d);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .header h2 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    #chat {
      height: 380px;
      overflow-y: auto;
      padding: 20px;
      background: #fffaf5;
    }

    .message {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      max-width: 85%;
      line-height: 1.4;
      font-size: 15px;
    }

    .user {
      background: #ff7a18;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: white;
      color: #333;
      border: 1px solid #f0d4c2;
      border-bottom-left-radius: 4px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: white;
      border-top: 1px solid #f1d6c7;
    }

    input {
      flex: 1;
      padding: 13px 15px;
      border-radius: 14px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #ff7a18;
    }

    button {
      border: none;
      background: #ff7a18;
      color: white;
      padding: 0 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    button:hover {
      background: #e96b10;
      transform: translateY(-1px);
    }

    .quick-buttons {
      display: flex;
      gap: 8px;
      padding: 14px 16px 0;
      background: white;
    }

    .quick-buttons button {
      flex: 1;
      padding: 10px;
      font-size: 13px;
      background: #fff1e8;
      color: #d85b00;
    }

    .quick-buttons button:hover {
      background: #ffe0cc;
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="header">
      <h2>🍽 Restaurant AI Assistant</h2>
      <p>Ask me about breakfast, lunch, or dinner menu</p>
    </div>

    <div class="quick-buttons">
      <button onclick="quickAsk('What is in breakfast?')">Breakfast</button>
      <button onclick="quickAsk('What is in lunch?')">Lunch</button>
      <button onclick="quickAsk('What is in dinner?')">Dinner</button>
    </div>

    <div id="chat">
      <div class="message bot">
        👋 Hi! I can help you check today’s menu.
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Ask: What's on the lunch menu?"
        onkeydown="handleEnter(event)"
      />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const inputBox = document.getElementById("userInput");
      const input = inputBox.value.trim();

      if (!input) return;

      addMessage(input, "user");
      inputBox.value = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ input }),
        });

        const data = await res.json();
        addMessage(data.output, "bot");
      } catch (error) {
        addMessage("Sorry, server error. Please try again.", "bot");
      }
    }

    function addMessage(text, sender) {
      const chatDiv = document.getElementById("chat");
      const msg = document.createElement("div");

      msg.className = `message ${sender}`;
      msg.innerText = sender === "user" ? `👤 ${text}` : `🤖 ${text}`;

      chatDiv.appendChild(msg);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function quickAsk(text) {
      document.getElementById("userInput").value = text;
      sendMessage();
    }

    function handleEnter(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }
  </script>
</body>
</html>
